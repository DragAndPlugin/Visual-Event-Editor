<!DOCTYPE html>
<html style="height: 100%">
    <head>
        <meta charset="UTF-8">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="viewport" content="user-scalable=no">
        <link rel="icon" href="../icon/icon.png" type="image/png">
        <link rel="apple-touch-icon" href="../icon/icon.png">
		<link href="../css/Drag_DevTools.css" rel="stylesheet">
		<style>
			html {
				overflow-y: auto;
				--hidden-opacity: 0.7;
			}

			#content {
				height: 100%;
				margin: 0;
				overflow: hidden;
				display: flex;
				flex-direction: row;
			}
			
			#enemy-list-panel {
				box-sizing: border-box;
				border-right: 0.125em solid rebeccapurple;
				display: flex;
				flex-direction: column;
				float: left;
				width: 40%;
				max-width: 350px;
				height: calc(100% - 3.125em);
			}
			
			#enemy-list-panel > * {
				margin-bottom: 1em;
			}
			
			#enemy-list-panel > h3 {
				background: rgb(0 0 0 / 0.3);
				margin: 0;
				border-bottom: 0.0625em solid rebeccapurple;
				text-transform: capitalize;
				text-align: center;
				font-size: 1.75em;
				padding: 0.75em 1.5em;
			}
			
			.search {
				padding: 0.5em;
				cursor: pointer;
				border: 0.125em solid transparent;
				display: flex;
				align-items: center;
				justify-content: flex-start;
			}
			
			.search > svg {
				min-width: 1.5625em;
				min-height: 1.5625em;
				width: 1.5em;
				height: 1.5em;
			}
			
			.search > * {
				margin-right: 0.25em;
			}
			
			.search > *:last-child {
				margin-right: 0em;
			}
			
			#enemy-list .selected {
				border: 0.0625em solid white !important;
			}
			
			#enemy-list {
				display: flex;
				flex-direction: column;
				align-items: center;
				overflow-y: auto;
				flex-grow: 1;
				flex-shrink: 1;
			}
			
			#enemy-list > * {
				min-height: 2.8125em;
				width: 100%;
				text-align: center;
				box-sizing: border-box;
				border: 0.0625em solid transparent;
				display: flex;
				justify-content: center;
			}
			
			#enemy-list > *:hover {
				border: 0.0625em solid white;
			}
			
			#enemy-list > * > span {
				margin: auto;
			}
			
			#enemy-list > * > button {
				height: 100%;
				padding: 0px 1.25em;
				border: none;
				border-left: 0.0625em solid white;
				border-radius: 0px;
				cursor: pointer;
				background-color: transparent;
			}
			
			#enemy-list > *:nth-child(odd) {
				background: rgb(0 0 0 / .15);
			}
			
			#enemy-list > *:nth-child(even) {
				background: rgb(255 255 255 / 0.15);
			}
			
			#troop-members-panel {
				text-align: center;
				position: relative;
				display: flex;
				flex-direction: column;
				align-items: center;
				overflow-y: auto;
				float: left;
				flex-grow: 1;
				height: calc(100% - 3.125em);
			}
			
			#members-view {
				--hp: 1;
				--wp: 1;
				position: relative;
				overflow: hidden;
				user-select: none;
			}
			
			#members-view, #members-buttons, #view-background {
				width: 100%;
			}
			
			#bg1, #bg2 {
				width: 100%;
				height: auto;
			}
			
			#bg2 {
				position: absolute;
				top: 0;
				left: 0;
			}
			
			#enemy-sprite {
				position: absolute;
				transform: translate(-50%, -100%);
				cursor: -webkit-grab;
				border: 0.125em solid transparent;
			}
			
			#enemy-sprite.selected, #enemy-sprite:hover {
				border: 0.125em solid white;
				box-shadow: 0 0 0 0.1875em black;
			}
			
			#enemy-sprite[data-hidden="true"] {
				opacity: var(--hidden-opacity);
			}
			
			#viewport {
				position: absolute;
				top: 0;
				left: 50%;
				transform: translate(-50%, 0%);
				width: 816px;
				height: 624px;
				border: 0.1875em solid rgb(30 144 255 / 0.75);
				box-sizing: content-box;
			}
			
			#members-buttons {
				display: flex;
				align-items: flex-end;
				justify-content: space-evenly;
			}
			
			#bottom-container {
				position: fixed;
				bottom: 0;
				left: 0;
				right: 0;
				padding: 0.5em 1em;
				border-top: 0.125em solid rebeccapurple;
				background-color: var(--background-color);
				display: flex;
				justify-content: flex-end;
				height: 3.125em;
				box-sizing: border-box;
			}
			
			#bottom-container > * {
				margin-right: 1.5em;
			}
			
			#bottom-container > *:last-child {
				margin-right: 0em;
			}

			#bottom-container > button {
				cursor: pointer;
				padding: 0.5em 2em;
			}
			
			#sprite-context-menu {
				position: absolute;
				user-select: none;
			}
			
			#change-background-input {
				cursor: pointer;
				background-image: none !important;
				width: 10em;
				border: 0.125em solid rebeccapurple;
			}
		</style>
    </head>
    <body style="height: 100%">
		<div id="content">
			<div id="enemy-list-panel">
				<h3>Troop Members</h3>
				<div class="search">
					<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="25px" height="25px">
						<circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" fill="none"/>
						<line x1="16.5" y1="16.5" x2="22" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
					</svg>
					<input type="text" placeholder="Search by id/name..." onchange="searchEnemy(this);" onkeyup="this.onchange();" onpaste="this.onchange();" oninput="this.onchange();"/>
				</div>
				<div id="enemy-list"></div>
			</div>
			<div id="troop-members-panel">
				<div id="members-view">
					<div id="view-background">
						<img id="bg1"/>
						<img id="bg2"/>
					</div>
					<div id="viewport"></div>
				</div>
				<div id="members-buttons">
					<input type="text" id="change-background-input" 
						onclick="$.Drag.VisualEvent.openFileExplorer(this);" onchange="updateTroopMembersBackground(this);" onfocus="this.blur()"
						data-fileCount='2' data-src='["img/battlebacks2", "img/battlebacks1"]' data-previewType='image' data-allowNone='false' data-exitFolder='false' data-allowSubFolder='true' data-fileTypes='png'data-valueCount="2" data-inputType="image" 
						value="Change Background..."
					/>
					<button onclick="clearTroopMembers();" style="width: 6.25em;">Clear</button>
					<div class="flex" style="flex-direction: row; align-items: baseline;">
						<button onclick="alignTroopMembers();" style="width: 6.25em;">Align</button>
						<label for="align-members-y" style="margin-top: 0.5em; margin-right: 0.5em; margin-left: 0.5em;">Y:</label>
						<div class="relative" style="margin-top: 0.5em;">
							<input type="number" id="align-members-y" value="66" max="100" min="0" placeholder="66" style="min-width: 5em;"
								onchange="$.Drag.VisualEvent.sanitizeInput(this);" onkeyup="this.onchange();" onpaste="this.onchange();" oninput="this.onchange();"
								data-isInputInteger="true" data-inputType="integer" data-defaultValue="66"
							/>
							<span class="input-tooltip" data-tooltip="%"></span>
						</div>
					</div>
					<div style="max-width: 11em;">
						<label for="hidden-members-opacity">Hidden Members Opacity:</label>
						<div class="relative" style="margin-top: 0.5em; margin-left: 1.5em;">
							<input type="number" id="hidden-members-opacity" value="75" max="100" min="0" placeholder="75" 
								onchange="$.Drag.VisualEvent.sanitizeInput(this); updateHiddenMembersOpacity(this);" onkeyup="this.onchange();" onpaste="this.onchange();" oninput="this.onchange();"
								data-isInputInteger="true" data-inputType="integer" data-defaultValue="75"
							/>
							<span class="input-tooltip" data-tooltip="%"></span>
						</div>
					</div>
				</div>
			</div>
			<div id="bottom-container">
				<button onclick="ok()">OK</button>
				<button onclick="quit();">Cancel</button>
			</div>
			<div id="sprite-context-menu" class="contextmenu hidden">
				<p>Actions</p>
				<div>
					<span onclick="removeTroopMember();">Remove</span>
					<span class="flex" onclick="$.Drag.VisualEvent.toggleCheckbox(this.firstElementChild);">
						<input type="checkbox" id="troop-member-hidden" style="pointer-events: none;" onchange="toggleTroopMemberHidden();"/>
						<span style="margin-left: 0.5em; pointer-events: none;">Appear Mid-Battle</span>
					</span>
					<span onclick="duplicateTroopMember();">Duplicate</span>
				</div>
			</div>
		</div>
		<!--<div onclick="$.Drag.VisualEvent.toggleLightMode(document)" id="lightMode">
			<span>&#9790;</span>
			<span>&#9728;</span>-->
		</div>
		<script type="text/javascript">			
			function main() {
				document.title = "Drag_DevTools_TroopMembersManager";
				loadDataMainWindow();
				$.Drag.VisualEvent.setLightMode(document);
				
				setup();
			};
			
			function loadDataMainWindow() {
				$ = window.opener;
			};
			
			function setup() {
				// for some reason there is an offset between the sprite y and it's vertical position on the screen, in battle
				window._SPRITE_BOUNDS_Y_OFFSET = 20;
				
				makeEnemyList();
				makeTroopMembersView();
			};
			
			function makeEnemyList() {
				const list = document.querySelector('#enemy-list');
				list.innerHTML = '';
				
				for (const enemy of data.enemies) {
					if (!enemy)
						continue;
					
					const item = document.createElement('div');
					const id = String(enemy.id).padStart(4, '0');
					item.innerHTML = `<span>${id}: ${enemy.name}</span><button data-enemyId="${enemy.id}" onclick="addTroopMemberFromList(this);">Add</button>`;
					
					item.setAttribute('data-id', id);
					item.setAttribute('data-name', enemy.name);
					// item.addEventListener('click', selectEnemy);
					
					list.appendChild(item);
				}
			};
			
			function searchEnemy(input) {
				const val = input.value.toLowerCase().trim();
				
				const enemies = document.querySelectorAll('#enemy-list > div');
				for (const enemy of enemies) 
					if (enemy.getAttribute('data-id').includes(val) || enemy.getAttribute('data-name').toLowerCase().includes(val))
						enemy.classList.remove('hidden');
					else
						enemy.classList.add('hidden');
			};
			
			function selectEnemy(event) {
				for (const selected of document.querySelectorAll('#enemy-list .selected'))
					selected.classList.remove('selected');
				
				event.target.classList.add('selected');
			};
			
			function makeTroopMembersView() {
				const battlebacks1 = getFileList("img/battlebacks1/");
				const viewportPreview = document.querySelector('#viewport');
				const bg1 = document.querySelector('#bg1');
				bg1.src = `/img/battlebacks1/${battlebacks1[0]}`;
				
				bg1.onload = () => {
					bg1.style.width = `${bg1.naturalWidth}px`; 
					
					for (const [i, member] of data.troop.members.entries()) {
						const enemy = data.enemies[member.enemyId];
						addTroopMember(enemy, member.x, member.y, i, member.hidden);
					}
					
					window._bg1LoadInterval = setInterval(() => {
						if (viewportPreview.childElementCount === data.troop.members)
							return;
						
						clearInterval(window._bg1LoadInterval);
						bg1.style.width = "100%";
						backgroundObserver.observe(bg1);
					}, 10);
					
					bg1.onload = null;
				};
				
				const battlebacks2 = getFileList("img/battlebacks2/");
				const bg2 = document.querySelector('#bg2');
				bg2.src = `/img/battlebacks2/${battlebacks2[0]}`;
			};
			
			function updateTroopMembersBackground(input) {
				input.setAttribute('data-value', input.value);
				const bgs = input.value.split(',');
				input.value = "Change Background...";
				
				const bg1 = document.querySelector('#bg1');
				bg1.src = `/img/battlebacks1/${bgs[1]}.png`;
				
				const bg2 = document.querySelector('#bg2');
				bg2.src = `/img/battlebacks2/${bgs[0]}.png`;
			};
			
			function addTroopMemberFromList(button) {
				if (!button)
					return;
				
				const enemyId = parseInt(button.getAttribute('data-enemyId'));
				if (!enemyId)
					return;
				
				const enemy = data.enemies[enemyId];
				if (!enemy)
					return;
				
				addTroopMember(enemy);
			};
			
			function addTroopMember(enemy, x = null, y = null, id = null, hidden = false) {				
				if (!enemy)
					return;
				
				const sprite = document.createElement('img');
				
				sprite.src = `/img/enemies/${enemy.battlerName}.png`;
				sprite.onload = () => {
					sprite.setAttribute('id', 'enemy-sprite');
					sprite.setAttribute('data-enemyId', enemy.id);
					sprite.setAttribute('data-name', enemy.name);
					sprite.setAttribute('data-hidden', hidden);
					if (id === null)
						id = document.querySelectorAll('#enemy-sprite').length;
					sprite.setAttribute('data-troopId', id)
					
					const view = document.querySelector('#members-view');
					const wp = parseFloat(getComputedStyle(view).getPropertyValue('--wp'));
					const hp = parseFloat(getComputedStyle(view).getPropertyValue('--hp'));
					sprite.style.width = `${sprite.naturalWidth * wp}px`;
					sprite.style.height = `${sprite.naturalHeight * hp}px`;
					
					sprite.addEventListener('mousedown', onEnemySpriteMouseDown);
					sprite.addEventListener('contextmenu', showEnemySpriteContextMenu);
					
					const bg1Rect = document.querySelector('#bg1').getBoundingClientRect();
					if (x === null)
						x = bg1Rect.width / 2;
					if (y === null) {
						const view = document.querySelector('#members-view');
						const hp = parseFloat(getComputedStyle(view).getPropertyValue('--hp'));
						y = bg1Rect.height / 2 + sprite.naturalHeight / hp / 2;
					}
					
					setMemberTroopPosition(sprite, x, y)
					
					const spriteContainer = document.querySelector('#viewport');
					spriteContainer.appendChild(sprite);
				};
			};
			
			function toggleTroopMemberHidden(sprite = document.querySelector('#enemy-sprite.selected')) {
				if (!sprite)
					return;
				
				const hidden = sprite.getAttribute('data-hidden') === "true";
				sprite.setAttribute('data-hidden', !hidden);
			};
			
			function duplicateTroopMember(sprite = document.querySelector('#enemy-sprite.selected')) {
				hideEnemySpriteContextMenu();
				if (!sprite)
					return;
				
				const enemyId = parseInt(sprite.getAttribute('data-enemyId'));
				if (!enemyId)
					return;
				
				const enemy = data.enemies[enemyId];
				if (!enemy)
					return;
				
				addTroopMember(enemy);
			};
			
			function onEnemySpriteMouseDown(event) {
				if (event.which === 1)
					startGrabEnemySprite(event);
			};
			
			function showEnemySpriteContextMenu(event) {
				const ctx = document.querySelector('#sprite-context-menu');
				
				const name = event.target.getAttribute('data-name') || "";
				const id = parseInt(event.target.getAttribute('data-troopId')) || 0;
				ctx.querySelector('p').innerHTML = `Member ${id + 1}: ${name}`;
				
				ctx.classList.remove('hidden');
				ctx.style.top = `${event.y}px`;
				ctx.style.left = `${event.x}px`;
				
				const hidden = event.target.getAttribute('data-hidden') === "true";
				const hiddenCheckbox = ctx.querySelector('#troop-member-hidden');
				hiddenCheckbox.checked = hidden;
				
				selectTroopMemberSprite(event.target);
				
				event.stopPropagation();
				event.preventDefault();
			};
			
			window.addEventListener('mousedown', hideEnemySpriteContextMenu);
			function hideEnemySpriteContextMenu(event) {
				const ctx = document.querySelector('#sprite-context-menu');
				if (event && event.path.includes(ctx))
					return;
				
				ctx.classList.add('hidden');
			};
			
			function startGrabEnemySprite(event) {
				window.data._grabbedSprite = event.target;
				
				const targetRect = event.target.getBoundingClientRect();
				const viewportRect = document.querySelector('#viewport').getBoundingClientRect();
				
				window.data._xGrabOffset = (targetRect.width / 2) - (event.x - targetRect.x) - viewportRect.x;
				window.data._yGrabOffset = targetRect.height - (event.y - targetRect.y) - viewportRect.y;
				
				selectTroopMemberSprite(window.data._grabbedSprite);
				
				window.data._grabbedSprite.style.cursor = '-webkit-grabbing';
			};
			
			function selectTroopMemberSprite(sprite) {
				for (const selected of document.querySelectorAll('#enemy-sprite.selected'))
					selected.classList.remove('selected');
				
				sprite.classList.add('selected');
			};
			
			window.addEventListener('mouseup', function(event) {
				if (window.data._grabbedSprite)
					window.data._grabbedSprite.style.removeProperty('cursor');
				
				window.data._grabbedSprite = null;
				window.data._xGrabOffset = 0;
				window.data._yGrabOffset = 0;
			});
			
			window.addEventListener('mousemove', function(event) {
				if (!window.data._grabbedSprite)
					return;
				
				event.preventDefault();
				
				const x = event.x + window.data._xGrabOffset;
				const y = event.y + window._SPRITE_BOUNDS_Y_OFFSET + window.data._yGrabOffset;
				
				setMemberTroopPosition(window.data._grabbedSprite, x, y)
			});
			
			function setMemberTroopPosition(sprite, x, y) {
				y -= window._SPRITE_BOUNDS_Y_OFFSET;
				
				const view = document.querySelector('#members-view');
				const wp = parseFloat(getComputedStyle(view).getPropertyValue('--wp'));
				const hp = parseFloat(getComputedStyle(view).getPropertyValue('--hp'));
				
				sprite.style.left = `${Math.round(x)}px`;
				sprite.style.top = `${Math.round(y)}px`;
				sprite.setAttribute('data-x', Math.round(x / wp));
				sprite.setAttribute('data-y', Math.round(y / hp));
			};
			
			function clearTroopMembers() {
				for (const sprite of document.querySelectorAll('#enemy-sprite'))
					removeTroopMember(sprite);
			};
			
			function removeTroopMember(sprite = document.querySelector('#enemy-sprite.selected')) {
				if (!sprite)
					return;
				
				sprite.remove();
				hideEnemySpriteContextMenu();
			};
			
			function alignTroopMembers() {
				const viewport = document.querySelector('#viewport');
				const wv = parseFloat(viewport.style.width);
				const hv = parseFloat(viewport.style.height);
				
				const spriteEnemies = Array.from(document.querySelectorAll('#enemy-sprite'));
				const tw = spriteEnemies.reduce((acc, sprite) => acc + parseFloat(sprite.style.width), 0);

				const yInputVal = parseInt(document.querySelector('#align-members-y').value) / 100;
				const y = (hv * yInputVal) + window._SPRITE_BOUNDS_Y_OFFSET;
				if (tw <= wv) {
					const dw = wv / spriteEnemies.length;
					for (const [i, sprite] of spriteEnemies.entries()) {
						const x = dw * (i + 0.5);
						setMemberTroopPosition(sprite, x, y);
					}
				} else {
					// const scale = wv / tw;
					const dw = (tw - wv) / (spriteEnemies.length - 1);
					let x = 0;
					for (const [i, sprite] of spriteEnemies.entries()) {
						x += parseFloat(sprite.style.width) / (i === 0 ? 2 : 1);
						setMemberTroopPosition(sprite, x, y);
						x -= dw;
					}
				}
			};
			
			function updateHiddenMembersOpacity(input) {
				const val = parseInt(input.value) / 100;
				
				document.documentElement.style.setProperty("--hidden-opacity", isNaN(val) ? 0.75 : val);
			};
			
			function getFileList(dirPath) {
				const fs = require('fs');
				const path = require('path');
				
				const types = [".png"];			
				
				const filesAndFolders = fs.readdirSync(dirPath);
				const files = filesAndFolders.filter((item) => {
					const itemPath = path.join(dirPath, item);
					const extName = path.extname(itemPath);
					const stats = fs.statSync(itemPath);
					return stats.isFile() && types.includes(extName);
				});
				
				return files;
			};
			
			function gatherTroopMembers() {
				const view = document.querySelector('#members-view');
				const wp = parseFloat(getComputedStyle(view).getPropertyValue('--wp'));
				const hp = parseFloat(getComputedStyle(view).getPropertyValue('--hp'));
				
				const enemySprites = Array.from(document.querySelectorAll('#enemy-sprite'));
				const members = new Array(enemySprites.length);
				
				for (const [memberId, sprite] of enemySprites.entries()) {
					const x = Math.round(parseInt(sprite.style.left) / wp);
					const y = Math.round(parseInt(sprite.style.top) / hp + window._SPRITE_BOUNDS_Y_OFFSET);
					
					members[memberId] = {
						enemyId: parseInt(sprite.getAttribute('data-enemyId')),
						x: x,
						y: y,
						hidden: sprite.getAttribute('data-hidden') === "true"
					};
				}
				return members;
			};

			function ok() {
				const val = gatherTroopMembers();
				
				$.Drag.VisualEvent.updateEventMembers(data.troop.id, val);
				data.input.dispatchEvent(new Event('change', {bubbles: true}));				
				quit();
			};

			function quit() {
				window.close();
			};
			
			const backgroundObserver = new ResizeObserver((entries) => {
				if (!Array.isArray(entries) || !entries.length)
					return;
				
				for (const entry of entries) {
					const img = entry.target;
					const imgRect = img.getBoundingClientRect();
					const wp = imgRect.width / img.naturalWidth;
					const hp = imgRect.height / img.naturalHeight;
					
					const viewport = document.querySelector('#viewport');
					viewport.style.width = `${$.Graphics.width * wp}px`;
					viewport.style.height = `${$.Graphics.height * hp}px`;
					// console.log(wp, hp, `translate(-50%, 0%) scaleX(${wp}) scaleY(${hp});`);
					// viewport.style.transform = `translate(-50%, 0%) scaleX(${wp}) scaleY(${hp})`;
					
					const membersView = document.querySelector('#members-view');
					for (const enemySprite of document.querySelectorAll("#enemy-sprite")) {
						enemySprite.style.width = `${enemySprite.naturalWidth * wp}px`;
						enemySprite.style.height = `${enemySprite.naturalHeight * hp}px`;
						
						const x = parseInt(enemySprite.getAttribute('data-x'));
						const y = parseInt(enemySprite.getAttribute('data-y'));
						enemySprite.style.left = `${Math.round(x * wp)}px`;
						enemySprite.style.top = `${Math.round(y * hp)}px`;
					};
					
					membersView.style.setProperty('--wp', `${wp}`);
					membersView.style.setProperty('--hp', `${hp}`);
				}
			});

			main();

		</script>
	</body>
</html>
