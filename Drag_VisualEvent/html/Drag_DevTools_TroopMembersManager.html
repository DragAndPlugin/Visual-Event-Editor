<!DOCTYPE html>
<html style="height: 100%">
	<head>
		<meta charset="UTF-8">
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
		<meta name="viewport" content="user-scalable=no">
		<link rel="icon" href="../../icon/icon.png" type="image/png">
		<link rel="apple-touch-icon" href="../../icon/icon.png">
		<link href="../css/Drag_DevTools.css" rel="stylesheet">
		<style>
			html {
				height: 100%;
				overflow: hidden;
				--hidden-opacity: 0.7;
			}

			body {
				height: 100%;
				margin: 0;
				overflow: hidden;
			}

			#content {
				height: 100%;
				margin: 0;
				overflow: hidden;
				display: flex;
				flex-direction: row;
				padding-bottom: 3.125em;
				box-sizing: border-box;
			}

			#enemy-list-panel {
				box-sizing: border-box;
				border-right: 0.125em solid rebeccapurple;
				display: flex;
				flex-direction: column;
				width: 40%;
				max-width: 350px;
				height: 100%;
				min-height: 0;
			}

			#enemy-list-panel > * {
				margin-bottom: 1em;
			}

			#enemy-list-panel > h3 {
				background: rgb(0 0 0 / 0.3);
				margin: 0;
				border-bottom: 0.0625em solid rebeccapurple;
				text-transform: capitalize;
				text-align: center;
				font-size: 1.75em;
				padding: 0.75em 1.5em;
				flex: 0 0 auto;
			}

			.search {
				padding: 0.5em;
				cursor: pointer;
				border: 0.125em solid transparent;
				display: flex;
				align-items: center;
				justify-content: flex-start;
				flex: 0 0 auto;
			}

			.search > svg {
				min-width: 1.5625em;
				min-height: 1.5625em;
				width: 1.5em;
				height: 1.5em;
			}

			.search > * {
				margin-right: 0.25em;
			}

			.search > *:last-child {
				margin-right: 0;
			}

			#enemy-list .selected {
				border: 0.0625em solid white !important;
			}

			#enemy-list {
				display: flex;
				flex-direction: column;
				align-items: center;
				overflow-y: auto;
				flex: 1 1 auto;
				min-height: 0;
			}

			#enemy-list > * {
				min-height: 2.8125em;
				width: 100%;
				text-align: center;
				box-sizing: border-box;
				border: 0.0625em solid transparent;
				display: flex;
				justify-content: center;
			}

			#enemy-list > *:hover {
				border: 0.0625em solid white;
			}

			#enemy-list > * > span {
				margin: auto;
			}

			#enemy-list > * > button {
				padding: 0 1.25em;
				border: none;
				border-left: 0.0625em solid white;
				border-radius: 0;
				cursor: pointer;
				background-color: transparent;
			}

			#enemy-list > *:nth-child(odd) {
				background: rgb(0 0 0 / .15);
			}

			#enemy-list > *:nth-child(even) {
				background: rgb(255 255 255 / 0.15);
			}

			#troop-members-panel {
				text-align: center;
				position: relative;
				display: flex;
				flex-direction: column;
				align-items: stretch;
				overflow: hidden;
				flex: 1 1 auto;
				height: 100%;
				min-width: 0;
				min-height: 0;
			}

			#members-view {
				--preview-scale: 1;
				position: relative;
				overflow: hidden;
				user-select: none;
				flex: 1 1 auto;
				min-height: 0;
				width: 100%;
				display: flex;
				align-items: flex-start;
				justify-content: center;
				padding-bottom: 0.5em;
				box-sizing: border-box;
			}

			#viewport {
				position: relative;
				overflow: hidden;
				border: solid rgb(30 144 255 / 0.75);
				border-width: 0 0.1875em 0.1875em 0.1875em;
				box-sizing: content-box;
				flex: 0 0 auto;
				background: black;
			}

			#view-background {
				position: absolute;
				top: 0;
				bottom: 0;
				left: 0;
				right: 0;
				overflow: hidden;
				pointer-events: none;
			}

			#bg1,
			#bg2 {
				position: absolute;
				left: 50%;
				top: 50%;
				transform: translate(-50%, -50%);
				pointer-events: none;
				user-select: none;
			}

			.enemy-sprite {
				position: absolute;
				transform: translate(-50%, -100%);
				cursor: -webkit-grab;
				border: 0.125em solid transparent;
				box-sizing: content-box;
				user-select: none;
			}

			.enemy-sprite.selected,
			.enemy-sprite:hover {
				border: 0.125em solid white;
				box-shadow: 0 0 0 0.1875em black;
			}

			.enemy-sprite[data-hidden="true"] {
				opacity: var(--hidden-opacity);
			}

			#members-buttons {
				width: 100%;
				display: flex;
				align-items: flex-end;
				justify-content: space-evenly;
				flex: 0 0 auto;
				padding: 0.5em;
				box-sizing: border-box;
			}

			#bottom-container {
				position: fixed;
				bottom: 0;
				left: 0;
				right: 0;
				padding: 0.5em 1em;
				border-top: 0.125em solid rebeccapurple;
				background-color: var(--background-color);
				display: flex;
				justify-content: flex-end;
				height: 3.125em;
				box-sizing: border-box;
			}

			#bottom-container > * {
				margin-right: 1.5em;
			}

			#bottom-container > *:last-child {
				margin-right: 0;
			}

			#bottom-container > button {
				cursor: pointer;
				padding: 0.5em 2em;
			}

			#sprite-context-menu {
				position: absolute;
				user-select: none;
				z-index: 20;
			}

			#change-background-input {
				cursor: pointer;
				background-image: none !important;
				width: 10em;
				border: 0.125em solid rebeccapurple;
			}
		</style>
	</head>
	<body style="height: 100%">
		<div id="content">
			<div id="enemy-list-panel">
				<h3>Troop Members</h3>
				<div class="search">
					<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="25px" height="25px">
						<circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" fill="none"/>
						<line x1="16.5" y1="16.5" x2="22" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
					</svg>
					<input type="text" placeholder="Search by id/name..." onchange="searchEnemy(this);" onkeyup="this.onchange();" onpaste="this.onchange();" oninput="this.onchange();"/>
				</div>
				<div id="enemy-list"></div>
			</div>
			<div id="troop-members-panel">
				<div id="members-view">
					<div id="viewport">
						<div id="view-background">
							<img id="bg1"/>
							<img id="bg2"/>
						</div>
					</div>
				</div>
				<div id="members-buttons">
					<input type="text" value="Change Background..." id="change-background-input" onclick="$.Drag.VisualEvent.openFileExplorer(this);" onchange="updateBattlebacks(this);" onfocus="this.blur()"
						data-fileCount="2" data-src='["img/battlebacks2", "img/battlebacks1"]' data-previewType="image" data-allowNone="false" data-exitFolder="false" data-allowSubFolder="true" data-fileTypes="png" data-valueCount="2" data-inputType="image"
					/>
					<button onclick="clearTroopMembers();" style="width: 6.25em;">Clear</button>
					<div class="flex" style="flex-direction: row; align-items: baseline;">
						<button onclick="alignTroopMembers();" style="width: 6.25em;">Align</button>
						<label for="align-members-y" style="margin-top: 0.5em; margin-right: 0.5em; margin-left: 0.5em;">Y:</label>
						<div class="relative" style="margin-top: 0.5em;">
							<input type="number" id="align-members-y" value="66" max="100" min="0" placeholder="66" style="min-width: 5em;"
								onchange="$.Drag.VisualEvent.sanitizeInput(this);" onkeyup="this.onchange();" onpaste="this.onchange();" oninput="this.onchange();"
								data-isInputInteger="true" data-inputType="integer" data-defaultValue="66"
							/>
							<span class="input-tooltip" data-tooltip="%"></span>
						</div>
					</div>
					<div style="max-width: 11em;">
						<label for="hidden-members-opacity">Hidden Members Opacity:</label>
						<div class="relative" style="margin-top: 0.5em; margin-left: 1.5em;">
							<input type="number" id="hidden-members-opacity" value="75" max="100" min="0" placeholder="75"
								onchange="$.Drag.VisualEvent.sanitizeInput(this); updateHiddenMembersOpacity(this);" onkeyup="this.onchange();" onpaste="this.onchange();" oninput="this.onchange();"
								data-isInputInteger="true" data-inputType="integer" data-defaultValue="75"
							/>
							<span class="input-tooltip" data-tooltip="%"></span>
						</div>
					</div>
				</div>
			</div>
			<div id="bottom-container">
				<button onclick="ok()">OK</button>
				<button onclick="quit();">Cancel</button>
			</div>
			<div id="sprite-context-menu" class="contextmenu hidden">
				<p>Actions</p>
				<div>
					<span onclick="removeTroopMember();">Remove</span>
					<span class="flex" onclick="$.Drag.VisualEvent.toggleCheckbox(this.firstElementChild);">
						<input type="checkbox" id="troop-member-hidden" style="pointer-events: none;" onchange="toggleTroopMemberHidden();"/>
						<span style="margin-left: 0.5em; pointer-events: none;">Appear Mid-Battle</span>
					</span>
					<span onclick="duplicateTroopMember();">Duplicate</span>
				</div>
			</div>
		</div>
		<script type="text/javascript">
			function main() {
				window.data = window.data || {};
				document.title = "Drag_DevTools_TroopMembersManager";
				
				loadDataMainWindow();
				$.Drag.VisualEvent.setLightMode(document);
				
				setup();
			};

			function loadDataMainWindow() {
				$ = window.opener;
			};

			function setup() {
				window.data._grabbedSprite = null;
				window.data._xGrabOffset = 0;
				window.data._yGrabOffset = 0;
				
				makeEnemyList();
				makeTroopMembersView();
				
				window.addEventListener('resize', refreshTroopPreview);
				window.addEventListener('mousedown', hideEnemySpriteContextMenu);
				window.addEventListener('mouseup', stopGrabEnemySprite);
				window.addEventListener('mousemove', updateGrabEnemySprite);
			};

			function makeEnemyList() {
				const list = document.querySelector('#enemy-list');
				list.innerHTML = '';
				
				for (const enemy of data.enemies || []) {
					if (!enemy)
						continue;
					
					const item = document.createElement('div');
					const id = String(enemy.id).padStart(4, '0');
					
					item.innerHTML = `<span>${id}: ${enemy.name}</span><button data-enemyId="${enemy.id}" onclick="addTroopMemberFromList(this);">Add</button>`;
					item.setAttribute('data-id', id);
					item.setAttribute('data-name', enemy.name || "");

					list.appendChild(item);
				}
			};

			function searchEnemy(input) {
				const val = input.value.toLowerCase().trim();
				
				for (const enemy of document.querySelectorAll('#enemy-list > div')) {
					const id = enemy.getAttribute('data-id') || "";
					const name = (enemy.getAttribute('data-name') || "").toLowerCase().trim();
					
					if (id.includes(val) || name.includes(val))
						enemy.classList.remove('hidden');
					else
						enemy.classList.add('hidden');
				}
			};

			function makeTroopMembersView() {
				loadDefaultBattlebacks();
				
				const bg1 = document.querySelector('#bg1');
				const bg2 = document.querySelector('#bg2');
				
				bg1.onload = refreshTroopPreview;
				bg2.onload = refreshTroopPreview;
				
				requestAnimationFrame(() => {
					addDataTroopMembers();
					refreshTroopPreview();
				});
			};

			function loadDefaultBattlebacks() {
				const battlebacks1 = $.Drag.VisualEvent.getFileList ? $.Drag.VisualEvent.getFileList("img/battlebacks1/", [".png"]) : [];
				const battlebacks2 = $.Drag.VisualEvent.getFileList ? $.Drag.VisualEvent.getFileList("img/battlebacks2/", [".png"]) : [];
				
				const bg1 = document.querySelector('#bg1');
				const bg2 = document.querySelector('#bg2');
				
				if (battlebacks1 && battlebacks1.length)
					bg1.src = `/img/battlebacks1/${battlebacks1[0]}`;
				else
					console.warn("No battlebacks1 image found.");
				
				if (battlebacks2 && battlebacks2.length)
					bg2.src = `/img/battlebacks2/${battlebacks2[0]}`;
				else
					console.warn("No battlebacks2 image found.");
			};

			function addDataTroopMembers() {
				if (!data.troop || !Array.isArray(data.troop.members))
					return;
				
				for (const [i, member] of data.troop.members.entries()) {
					const enemy = data.enemies && data.enemies[member.enemyId];
					addTroopMember(enemy, member.x, member.y, i, member.hidden);
				}
			};

			function updateBattlebacks(input) {
				input.setAttribute('data-value', input.value);
				
				const bgs = input.value.split(',');
				input.value = "Change Background...";
				
				const bg1 = document.querySelector('#bg1');
				const bg2 = document.querySelector('#bg2');
				
				if (bgs[1])
					bg1.src = `/img/battlebacks1/${bgs[1]}.png`;
				
				if (bgs[0])
					bg2.src = `/img/battlebacks2/${bgs[0]}.png`;
			};

			function refreshTroopPreview() {
				const membersView = document.querySelector('#members-view');
				const viewport = document.querySelector('#viewport');
				
				if (!membersView || !viewport)
					return;
				
				const rect = membersView.getBoundingClientRect();
				const width = rect.width;
				const height = rect.height;
				if (!width || !height)
					return;
				
				const res = $.Drag.VisualEvent.getGameResolution();
				const scale = Math.min(width / res.width, height / res.height);
				membersView.style.setProperty('--preview-scale', `${scale}`);
				
				viewport.style.width = `${Math.round(res.width * scale)}px`;
				viewport.style.height = `${Math.round(res.height * scale)}px`;
				scaleBattlebacks();
				
				for (const sprite of document.querySelectorAll('.enemy-sprite'))
					refreshSprite(sprite, scale);
			};

			function scaleBattlebacks() {
				const battlebacks = [document.querySelector('#bg1'), document.querySelector('#bg2')];
				for (const battleback of battlebacks) {
					if (!battleback || !battleback.naturalWidth || !battleback.naturalHeight)
						continue;
					
					const res = $.Drag.VisualEvent.getGameResolution();
					const scale = getScale();
					const isSideView = $.$gameSystem && $.$gameSystem.isSideView();
					
					const width = Math.floor((1000 * res.width) / 816);
					const height = Math.floor((740 * res.height) / 624);
					const x = (res.width - width) / 2;
					const y = isSideView ? res.height - height : 0;
					
					const scalex = width / battleback.naturalWidth;
					const scaley = height / battleback.naturalHeight;
					const battlebackScale = Math.max(scalex, scaley, 1.0);
					
					battleback.style.width = `${Math.round(battleback.naturalWidth * battlebackScale * scale)}px`;
					battleback.style.height = `${Math.round(battleback.naturalHeight * battlebackScale * scale)}px`;
					battleback.style.left = `${Math.round(x * scale)}px`;
					battleback.style.top = `${Math.round(y * scale)}px`;
					battleback.style.transform = "none";
				}
			};

			function addTroopMemberFromList(button) {
				if (!button)
					return;
				
				const enemyId = parseInt(button.getAttribute('data-enemyId'));
				if (!enemyId)
					return;
				
				const enemy = data.enemies && data.enemies[enemyId];
				if (!enemy)
					return;
				
				addTroopMember(enemy);
			};

			function getFolder() {
				return $.$dataSystem && $.$dataSystem.optSideView ? "sv_enemies" : "enemies";
			};

			function addTroopMember(enemy, x = null, y = null, id = null, hidden = false) {
				if (!enemy)
					return;
				
				const sprite = document.createElement('img');
				sprite.classList.add('enemy-sprite');
				
				const folder = getFolder();
				sprite.src = `/img/${folder}/${enemy.battlerName}.png`;
				
				sprite.onerror = () => {
					console.warn(`Enemy sprite not found: ${sprite.src}`);
					sprite.remove();
				};
				
				sprite.onload = () => {
					sprite.setAttribute('data-enemyId', enemy.id);
					sprite.setAttribute('data-name', enemy.name || "");
					sprite.setAttribute('data-hidden', hidden ? "true" : "false");
					
					if (id === null)
						id = document.querySelectorAll('.enemy-sprite').length;
					sprite.setAttribute('data-troopId', id);
					
					const res = $.Drag.VisualEvent.getGameResolution();
					if (x === null)
						x = Math.round(res.width / 2);
					if (y === null)
						y = Math.round(res.height / 2);
					sprite.setAttribute('data-x', x);
					sprite.setAttribute('data-y', y);
					
					sprite.addEventListener('mousedown', onEnemySpriteMouseDown);
					sprite.addEventListener('contextmenu', showEnemySpriteContextMenu);
					
					document.querySelector('#viewport').appendChild(sprite);
					refreshTroopPreview();
				};
			};
			
			function refreshSprite(sprite, scale = getScale()) {
				if (!sprite || !sprite.naturalWidth || !sprite.naturalHeight)
					return;
				
				sprite.style.width = `${Math.round(sprite.naturalWidth * scale)}px`;
				sprite.style.height = `${Math.round(sprite.naturalHeight * scale)}px`;
				
				//convert x,y from in game battle to preview x,y
				const offset = getSceneBattleOffset();
				const x = ((parseInt(sprite.getAttribute('data-x')) || 0) + offset.x) * scale;
				const y = ((parseInt(sprite.getAttribute('data-y')) || 0) + offset.y) * scale;
				
				sprite.style.left = `${Math.round(x)}px`;
				sprite.style.top = `${Math.round(y)}px`;
			};
			
			function setMemberTroopPosition(sprite, x, y) {
				if (!sprite)
					return;
				
				//convert x,y from preview to in game battle x,y  
				const scale = getScale();
				const offset = getSceneBattleOffset();
				x = Math.round((x / scale) - offset.x);
				y = Math.round((y / scale) - offset.y);
				
				sprite.setAttribute('data-x', x);
				sprite.setAttribute('data-y', y);
				refreshSprite(sprite);
			};
			
			function getScale() {
				const membersView = document.querySelector('#members-view');
				const scale = parseFloat(getComputedStyle(membersView).getPropertyValue('--preview-scale'));
				return scale || 1;
			};
			
			function getSceneBattleOffset() {
				const res = $.Drag.VisualEvent.getGameResolution();
				const uiRes = $.Drag.VisualEvent.getUIResolution();
				
				return {
					x: (res.width - uiRes.width) / 2,
					y: (res.height - uiRes.height) / 2 - (typeof $.Spriteset_Battle.prototype.battleFieldOffsetY === 'function' ? $.Spriteset_Battle.prototype.battleFieldOffsetY() : -32)
				};
			};
			
			function toggleTroopMemberHidden(sprite = document.querySelector('.enemy-sprite.selected')) {
				if (!sprite)
					return;
				
				const hidden = sprite.getAttribute('data-hidden') === "true";
				sprite.setAttribute('data-hidden', !hidden);
			};
			
			function duplicateTroopMember(sprite = document.querySelector('.enemy-sprite.selected')) {
				hideEnemySpriteContextMenu();

				if (!sprite)
					return;

				const enemyId = parseInt(sprite.getAttribute('data-enemyId'));
				if (!enemyId)
					return;

				const enemy = data.enemies && data.enemies[enemyId];
				if (!enemy)
					return;

				const x = parseInt(sprite.getAttribute('data-x')) || null;
				const y = parseInt(sprite.getAttribute('data-y')) || null;

				addTroopMember(enemy, x + 32, y, null, sprite.getAttribute('data-hidden') === "true");
			}
			
			function onEnemySpriteMouseDown(event) {
				if (event.which === 1)
					startGrabEnemySprite(event);
			};
			
			function showEnemySpriteContextMenu(event) {
				const ctx = document.querySelector('#sprite-context-menu');
				const name = event.target.getAttribute('data-name') || "";
				const id = parseInt(event.target.getAttribute('data-troopId')) || 0;

				ctx.querySelector('p').innerHTML = `Member ${id + 1}: ${name}`;
				ctx.classList.remove('hidden');
				ctx.style.top = `${event.clientY}px`;
				ctx.style.left = `${event.clientX}px`;

				const hidden = event.target.getAttribute('data-hidden') === "true";
				const hiddenCheckbox = ctx.querySelector('#troop-member-hidden');
				hiddenCheckbox.checked = hidden;

				selectTroopMemberSprite(event.target);

				event.stopPropagation();
				event.preventDefault();
			};
			
			function hideEnemySpriteContextMenu(event) {
				const ctx = document.querySelector('#sprite-context-menu');
				if (eventPathIncludes(event, ctx))
					return;
				
				ctx.classList.add('hidden');
			};
			
			function eventPathIncludes(event, element) {
				if (!event || !element)
					return false;

				if (event.composedPath)
					return event.composedPath().includes(element);

				let target = event.target;
				while (target) {
					if (target === element)
						return true;

					target = target.parentElement;
				}

				return false;
			};
			
			function startGrabEnemySprite(event) {
				window.data._grabbedSprite = event.target;
				
				const targetRect = event.target.getBoundingClientRect();
				window.data._xGrabOffset = targetRect.width / 2 - (event.clientX - targetRect.left);
				window.data._yGrabOffset = targetRect.height - (event.clientY - targetRect.top);
				
				selectTroopMemberSprite(window.data._grabbedSprite);
				window.data._grabbedSprite.style.cursor = '-webkit-grabbing';
				
				event.preventDefault();
			};
			
			function selectTroopMemberSprite(sprite) {
				for (const selected of document.querySelectorAll('.enemy-sprite.selected'))
					selected.classList.remove('selected');
				
				if (sprite)
					sprite.classList.add('selected');
			};

			function stopGrabEnemySprite() {
				if (window.data._grabbedSprite)
					window.data._grabbedSprite.style.removeProperty('cursor');
				
				window.data._grabbedSprite = null;
				window.data._xGrabOffset = 0;
				window.data._yGrabOffset = 0;
			}
			
			function updateGrabEnemySprite(event) {
				if (!window.data._grabbedSprite)
					return;
				
				event.preventDefault();
				
				const viewport = document.querySelector('#viewport');
				const rect = viewport.getBoundingClientRect();
				const x = event.clientX - rect.left;
				const y = event.clientY - rect.top;
				
				setMemberTroopPosition(
					window.data._grabbedSprite,
					x + window.data._xGrabOffset,
					y + window.data._yGrabOffset
				);
			};
			
			function clearTroopMembers() {
				for (const sprite of document.querySelectorAll('.enemy-sprite'))
					removeTroopMember(sprite);
			};
			
			function removeTroopMember(sprite = document.querySelector('.enemy-sprite.selected')) {
				if (!sprite)
					return;

				sprite.remove();
				hideEnemySpriteContextMenu();
				reindexTroopMembers();
			};
			
			function reindexTroopMembers() {
				for (const [i, sprite] of Array.from(document.querySelectorAll('.enemy-sprite')).entries())
					sprite.setAttribute('data-troopId', i);
			};
			
			function alignTroopMembers() {
				const viewport = document.querySelector('#viewport');
				const rect = viewport.getBoundingClientRect();
				const wv = rect.width;
				const hv = rect.height;
				
				const sprites = Array.from(document.querySelectorAll('.enemy-sprite'));
				if (!sprites.length)
					return;
				
				const yInputVal = (parseInt(document.querySelector('#align-members-y').value) || 66) / 100;
				const y = (hv * yInputVal);
				
				if (sprites.length === 1) {
					setMemberTroopPosition(sprites[0], wv / 2, y);
					return;
				}
				
				const totalWidth = sprites.reduce((acc, sprite) => acc + sprite.getBoundingClientRect().width, 0);
				if (totalWidth <= wv) { //if all sprite fit in width in the viewport
					const spacing = wv / sprites.length;
					//no overlap, same spacing between sprites
					for (const [i, sprite] of sprites.entries()) {
						const x = spacing * (i + 0.5);
						setMemberTroopPosition(sprite, x, y);
					}
				} else { //if total width doesn't fit viewport
					const overlap = (totalWidth - wv) / (sprites.length - 1);
					let x = 0;
					// no spacing, instead use overlap //might need to rework the math ?
					for (const [i, sprite] of sprites.entries()) {
						const width = sprite.getBoundingClientRect().width;
						
						x += width / (i === 0 ? 2 : 1);
						setMemberTroopPosition(sprite, x, y);
						x -= overlap;
					}
				}
			};
			
			function updateHiddenMembersOpacity(input) {
				const val = parseInt(input.value) / 100;
				document.documentElement.style.setProperty("--hidden-opacity", isNaN(val) ? 0.75 : val);
			};
			
			function gatherTroopMembers() {
				return Array.from(document.querySelectorAll('.enemy-sprite')).map(sprite => ({
					enemyId: parseInt(sprite.getAttribute('data-enemyId')) || 0,
					x: parseInt(sprite.getAttribute('data-x')) || 0,
					y: parseInt(sprite.getAttribute('data-y')) || 0,
					hidden: sprite.getAttribute('data-hidden') === "true"
				}));
			};
			
			function ok() {
				if (window._saving)
					return;
				
				window._saving = true;
				
				const members = gatherTroopMembers();
				$.Drag.VisualEvent.updateEventMembers(data.troop.id, members);
				
				quit();
			};
			
			function quit() {
				window.removeEventListener('resize', refreshTroopPreview);
				window.removeEventListener('mousedown', hideEnemySpriteContextMenu);
				window.removeEventListener('mouseup', stopGrabEnemySprite);
				window.removeEventListener('mousemove', updateGrabEnemySprite);
				
				window.close();
			};
			
			main();
		</script>
	</body>
</html>
