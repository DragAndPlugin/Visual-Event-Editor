<!DOCTYPE html>
<html style="height: 100%">
    <head>
        <meta charset="UTF-8">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="viewport" content="user-scalable=no">
        <link rel="icon" href="../../icon/icon.png" type="image/png">
        <link rel="apple-touch-icon" href="../../icon/icon.png">
		<link href="../css/Drag_DevTools.css" rel="stylesheet">
		<style>
			:root {
				--background-color2: #21222b;
			}
			
			html {
				overflow-y: auto;
			}

			#content {
				margin: 0;
				height: 100%;
				overflow: hidden;
				box-sizing: border-box;
				padding-bottom: 3em;
			}
			
			#inputs-container {
				display: grid;
				grid-template-columns: 1fr 14em;
				height: 100%;
				padding: 0em 0.25em 4rem 0.25em;
				box-sizing: border-box;
			}
			
			#inputs-container > div:first-child {
				font-size: 0.85em;
				overflow-y: auto;
				padding: 0.5em;
			}

			.struct-param {
				margin-bottom: 0.85em;
				padding: 0.65em 0.75em;
				text-overflow: ellipsis;
				background: rgb(255 255 255 / 5%);
			}

			.struct-param[data-has-children="true"] {
				background: rgb(255 255 255 / 10%);
			}

			#param-header {
				display: flex;
				align-items: center;
				justify-content: space-between;
				margin-bottom: 0.35em;
			}

			#param-header.collapsible {
				cursor: pointer;
				padding: 0.35em 0.5em;
				margin: -0.35em -0.5em 0.35em -0.5em;
			}

			#param-header.collapsible:hover {
				background: rgb(255 255 255 / 10%);
			}

			#param-header:first-child {
				display: flex;
				align-items: center;
				min-width: 0;
				font-weight: 700;
			}

			#collapse-arrow {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				width: 1.25em;
				margin-right: 0.25em;
				color: #8070d4;
				transition: transform 0.25s ease;
			}

			.struct-param[data-collapsed="true"] #collapse-arrow {
				transform: rotate(-90deg);
			}

			#param-header:last-child {
				display: flex;
				align-items: center;
				margin-left: 0.75em;
			}
			
			#param-header:last-child > * {
				margin-right: 0.45em;
			}

			#param-header:last-child > *:last-child {
				margin-right: 0;
			}

			#param-type {
				color: lightgrey;
				font-size: 0.75em;
				opacity: 0.7;
			}

			#param-header button {
				cursor: pointer;
				display: inline-flex;
				align-items: center;
				justify-content: center;
				width: 1.75em;
				height: 1.75em;
				padding: 0;
				line-height: 1;
			}

			#param-header button:hover {
				border: 0.0625em solid rgb(255 255 255 / 0.2);
				background: rgb(255 255 255 / 20%);
				color: white;
			}

			#param-header button:active {
				transform: scale(0.9);
			}

			.struct-param > span {
				margin-top: 0.15em;
				color: lightgrey;
				font-size: 0.9em;
				max-width: 100%;
			}
			
			#input-param-container {
				display: flex;
				flex-direction: column;
				align-items: flex-start;
			}

			#input-param-container > div {
				max-width: 100%;
			}
			
			#input-param-container > * {
				margin-bottom: 0.35em;
			}
			
			#input-param-container > *:last-child {
				margin-bottom: 0;
			}

			.struct-param-children {
				margin-left: 1.25em;
				padding-left: 0.85em;
				border-left: 0.125em solid #8070D8;
			}
			
			.struct-param-children > .struct-list-item {
				margin-left: 0;
			}
			
			.struct-list-item {
				position: relative;
				margin-bottom: 0.75em;
				padding-right: 5em;
			}

			#buttons-list {
				position: absolute;
				top: 0.45em;
				right: 0em;
				display: flex;
				font-size: 0.8em;
			}

			#buttons-list > *:first-child {
				margin-right: 0.25em;
			}

			#buttons-list button, #add-list button {
				cursor: pointer;
				min-width: 1.8em;
				height: 1.8em;
			}

			#buttons-list button:active, #add-list button:active {
				transform: scale(0.95);
			}

			#add-list {
				margin-top: 0.5em;
				margin-bottom: 1em;
			}

			#bottom-container {
				position: fixed;
				right: 0;
				bottom: 0;
				left: 0;
				display: flex;
				justify-content: flex-end;
				max-height: 3.125em;
				padding: 0.5em;
				box-sizing: border-box;
				border-top: 0.0625em solid rebeccapurple;
				background: var(--background-color2);
			}
			
			#bottom-container > * {
				margin-right: 1em;
			}
			
			#bottom-container > *:last-child {
				margin-right: 0em;
			}

			#bottom-container > button {
				cursor: pointer;
				padding: 0.5em 2em;
			}
			
			#add-list-input-button, #remove-list-input-button {
				display: none;
			}
			
			#struct-search-container {
				position: sticky;
				top: 0em;
				z-index: 2;
				padding-bottom: 1em;
				padding-top: 0.75em;
				padding-left: 0.5em;
				padding-right: 0.5em;
				background: var(--background-color);
				border-bottom: 0.0625em solid rebeccapurple;
			}

			#struct-search-container > input {
				width: 100%;
				padding: 0.6em 0.8em;
				box-sizing: border-box;
				background: var(--background-color2);
			}
			
			#parameters-tree {
				overflow-y: auto;
				padding: 0.75em 0.5em;
				border-left: 0.0625em solid rebeccapurple;
				background: var(--background-color2);
			}

			.parameters-tree-child {
				cursor: pointer;
				padding: 0.25em 0.4em;
				margin-bottom: 0.15em;
				font-size: 0.75em;
				color: lightgrey;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.parameters-tree-child:hover {
				color: white;
				background: rgb(255 255 255 / 10%);
			}

			.parameters-tree-child.selected {
				color: white;
				background: rgb(30 144 255 / 40%);
			}

			.search-hidden, .collapsed {
				display: none !important;
			}
			
			#autofit-textarea-checkbox {
				opacity: 0;
			}
			
			#autofit-textarea-checkbox:not(:checked) ~ span > svg > path {
				fill: grey !important;
				stroke: grey !important;
			}
			
			#autofit-textarea-checkbox:checked ~ span > svg > path {
				fill: white ! important;
				stroke: white !important;
			}
			
			input[type="checkbox"] + span {
				cursor: pointer;
			}
			
			input[type="text"], input[type="number"] {
				min-width: 0 !important;
				border: 0.0625rem solid var(--color);
			}
			
			input[type="text"]:focus, input[type="number"]:focus {
				border: 0.0625rem solid rebeccapurple;
			}

			input[data-inputtype="struct"], input[data-inputType="struct"] {
				display: none;
			}
			
			button {
				padding: 0.625em 1.25em;
				border: 0.0625em solid var(--color);
			}
			
			button:hover {
				background: var(--background-color2);
			}
			
			button:active {
				transform: scale(0.985);
			}
			
			textarea {
				max-width: 100%;
				border: 0.0625rem solid var(--color);
			}
			
			textarea:focus {
				outline: none;
				border: 0.0625rem solid rebeccapurple;
			}
		</style>
    </head>
    <body style="height: 100%">
		<div id="content">
			<div id="struct-search-container">
				<input type="text" placeholder="Search parameters..." oninput="searchParameters(this);">
			</div>
			<div id="inputs-container">
				<div onscroll="updateHighlightedParameterTree();"></div>
				<div id="parameters-tree"></div>
			</div>
			<div id="bottom-container">
				<button onclick="apply()">Apply</button>
				<button onclick="ok()">OK</button>
				<button onclick="quit();">Cancel</button>
			</div>
		</div>
		<script type="text/javascript">
			function main() {
				document.title = "Drag_DevTools_StructureManager";
				loadDataMainWindow();
				$.Drag.VisualEvent.setLightMode(document);
				makeStructInputsFields(data.value, data.structName, document.querySelector('#inputs-container > div:first-child'));
				refreshParametersTree();
			};
			
			function loadDataMainWindow() {
				$ = window.opener;
			};
			
			function searchParameters(input) {
				const container = document.querySelector('#inputs-container > div');
				if (!container)
					return;
				
				const value = input.value.toLowerCase().trim();
				if (!value) {
					for (const hidden of container.querySelectorAll('.search-hidden'))
						hidden.classList.remove('search-hidden');
					
					return;
				}
				
				for (const param of container.querySelectorAll('.struct-param, .struct-param-children'))
					param.classList.add('search-hidden');
				
				for (const param of container.querySelectorAll('.struct-param')) {
					const text = param.getAttribute('data-search') || param.textContent.toLowerCase();
					if (text.includes(value)) {
						showParam(param);
						showParamChildren(param);
					}
				}
			};
			
			function showParam(param) {
				param.classList.remove('search-hidden');
				
				let parent = param.parentElement;
				while (parent && parent.classList.contains('struct-param-children')) {
					parent.classList.remove('search-hidden');
					
					const parentParam = parent.previousElementSibling;
					if (!parentParam || !parentParam.classList.contains('struct-param'))
						break;
					
					parentParam.classList.remove('search-hidden');
					parent = parentParam.parentElement;
				}
			};
			
			function showParamChildren(param) {
				const children = param.nextElementSibling;
				
				if (children && children.classList.contains('struct-param-children')) {
					children.classList.remove('search-hidden');
					
					for (const hidden of children.querySelectorAll('.search-hidden'))
						hidden.classList.remove('search-hidden');
				}
			};
			
			function makeStructInputsFields(structValue, structName, target, depth = 0) {
				const pluginName = data.pluginName;
				const structData = $.Drag.VisualEvent.getLocalizedStruct(pluginName, structName);
				if (!structData || !Array.isArray(structData.params)) {
					target.innerHTML = `<span style="color: red;">Unknown structure: ${$.Drag.VisualEvent.escapeHTML(structName)}</span>`;
					return;
				}
				
				const paramsTree = {};
				const rootParams = [];
				const params = $.Drag.VisualEvent.deepCopyJSON(structData.params);
				for (const param of params) {
					if (!param || !param.name)
						continue;
					
					if (param.parent && params.some(p => p && p.name === param.parent)) {
						paramsTree[param.parent] = paramsTree[param.parent] || [];
						paramsTree[param.parent].push(param.name);
					} else
						rootParams.push(param.name);
				}
				
				const paramsByName = {};
				for (const param of params) {
					if (param && param.name)
						paramsByName[param.name] = param;
				}
				
				target.innerHTML = rootParams.map(name => getParamContent(name, paramsByName, paramsTree, structValue || {}, depth, structName)).join("");
				$.Drag.VisualEvent.triggerAllOnReadyOnChange(document);
			};
			
			function getParamContent(name, params, paramsTree, structValue = {}, depth = 0, sourceStructName = "") {
				const param = $.Drag.VisualEvent.deepCopyJSON(params[name]);
				if (!param || !param.name || param.type === "empty")
					return "";
				
				const isList = param.isList === true;
				if (isList)
					return getParamListContent(name, params, paramsTree, structValue, depth, sourceStructName);
				
				const children = paramsTree[name] || [];
				const isStruct = param.type === "struct";
				const hasChildren = isStruct || children.length > 0;
				const searchText = `${param.name || ""} ${param.text || ""} ${param.desc || ""} ${param.type || ""}`.toLowerCase();
				
				param.value = structValue[param.name];
				sanitizeParamValue(param);
				let html = `
					<div class="struct-param" style="margin-left: ${depth * 1.25}em;"
						data-input-name="${$.Drag.VisualEvent.escapeHTML(param.name)}" data-input-type="${$.Drag.VisualEvent.escapeHTML(param.type || "text")}" data-is-list="${isList ? "true" : "false"}"
						data-search="${$.Drag.VisualEvent.escapeHTML(searchText)}" data-struct-name="${$.Drag.VisualEvent.escapeHTML(param.structName || param.struct || param.name)}"  ${hasChildren ? 'data-has-children="true"' : ''}
					>
						<div id="param-header" class="${hasChildren ? 'collapsible' : ''}" ${hasChildren ? 'onclick="toggleStructParamGroup(this);"' : ''}>
							<div>
								${hasChildren ? '<span id="collapse-arrow">▾</span>' : ''}
								<b>${$.Drag.VisualEvent.escapeHTML(param.text || param.name)}</b>
							</div>
							<div>
								<span id="param-type">${$.Drag.VisualEvent.escapeHTML(`${param.type || "text"}${isList ? " [list]" : ""}`)}</span>
								<button onclick="restoreParamDefaultValue(event, this);" title="Reset to default">↺</button>
							</div>
						</div>
						${param.desc ? `<span class="struct-param-desc">${$.Drag.VisualEvent.escapeHTML(param.desc)}</span>` : ""}
						<div id="input-param-container" class="${isStruct ? 'hidden' : ''}">
				`;
				
				if (!isStruct) 
					html += getParamInputContent(param, param.value);
				
				html += `
						</div>
					</div>
				`;
				
				let childrenHtml = "";
				if (isStruct)
					childrenHtml += getNestedStructContent(param, param.value, depth + 1);
				
				if (children.length > 0)
					childrenHtml += children.map(childName => getParamContent(childName, params, paramsTree, structValue, depth + 1, sourceStructName)).join("");
				
				if (childrenHtml)
					html += `
						<div class="struct-param-children">
							${childrenHtml}
						</div>
					`;
				
				return html;
			};
			
			function sanitizeParamValue(param) {
				switch (param.type) {
					case "boolean":
					case "radio":
						param.value = (param.hasOwnProperty('value') ? String(param.value) : param.hasOwnProperty('default') ? String(param.default) : 'true') || 'true';
						if (param.value !== 'true' && param.value !== 'false')
							param.value = 'true';
						param.values = ["true", "false"];
						param.options = [param.on ? param.on : "On", param.off ? param.off : "Off"];
						break;
					case "color":
						param.type = "integer";
						param.value = param.hasOwnProperty('value') ? param.value : param.hasOwnProperty('default') ? param.default : 0;
						break;
					case "location":
						if (!param.hasOwnProperty('value') || Array.isArray(param.value)) {
							if (param.hasOwnProperty('default') && typeof param.default === 'string') {
								try {
									const value = JSON.parse(param.default);
									param.value = [value.mapId, value.x, value.y];
								} catch (error) {
									param.value = [0, 0, 0];
								}
							}
						}
						
						if (!Array.isArray(param.value))
							param.value = [0, 0, 0];
						else
							param.value = param.value.map(value => !isNaN(value) ? value : 0);
						
						break;
				}
				
				if (param.value === null || param.value === undefined) {
					if (param.hasOwnProperty('default'))
						param.value = param.default;
					else
						param.value = "";
				}
				console.log(param.value);
			};
			
			function getParamListContent(name, params, paramsTree, structValue = {}, depth = 0, sourceStructName = "") {
				const param = $.Drag.VisualEvent.deepCopyJSON(params[name]);
				if (!param || !param.name || param.type === "empty")
					return "";
				
				param.value = structValue[param.name];
				sanitizeParamList(param);
				
				const searchText = `${param.name || ""} ${param.text || ""} ${param.desc || ""} ${param.type || ""}`.toLowerCase();
				let html = `
					<div class="struct-param" style="margin-left: ${depth * 1.25}em;"
						data-input-name="${$.Drag.VisualEvent.escapeHTML(param.name)}" data-input-type="${$.Drag.VisualEvent.escapeHTML(param.type || "text")}" data-is-list="true" data-has-children="true"
						data-search="${$.Drag.VisualEvent.escapeHTML(searchText)}" data-struct-name="${$.Drag.VisualEvent.escapeHTML(param.structName || param.struct || param.name)}"
					>
						<div id="param-header" class="collapsible" onclick="toggleStructParamGroup(this);">
							<div>
								<span id="collapse-arrow">▾</span>
								<b>${$.Drag.VisualEvent.escapeHTML(param.text || param.name)}</b>
							</div>
							<div>
								<span id="param-type">${$.Drag.VisualEvent.escapeHTML(`${param.type || "text"} [list]`)}</span>
								<button onclick="restoreParamDefaultValue(event, this);" title="Reset to default">↺</button>
							</div>
						</div>
						${param.desc ? `<span class="struct-param-desc">${$.Drag.VisualEvent.escapeHTML(param.desc)}</span>` : ""}
					</div>
					<div class="struct-param-children struct-param-list" data-list-name="${$.Drag.VisualEvent.escapeHTML(param.name)}" data-depth="${depth + 1}" data-source-struct="${$.Drag.VisualEvent.escapeHTML(sourceStructName || "")}">
				`;
				
				for (const value of param.value)
					html += getParamListItem(param, value, depth + 1);
				
				html += `
						<div id="add-list">
							<button type="button" onclick="addListItem(event, this);">+</button>
						</div>
					</div>
				`;
				
				return html;
			};
			
			function sanitizeParamList(param) {
				if (Array.isArray(param.value))
					return;
				
				if (typeof param.value === "string") {
					try {
						param.value = param.value.trim() ? JSON.parse(param.value) : [];
					} catch (error) {
						param.value = [];
					}
				}
				
				if (!Array.isArray(param.value)) {
					if (param.hasOwnProperty('default') && typeof param.default === 'string') {
						try {
							param.value = JSON.parse(param.default);
						} catch (error) {
							param.value = [];
						}
					}
				}
				
				if (!Array.isArray(param.value))
					param.value = [param.value];
			};
			
			function getParamListItem(param, value = "", depth = 0) {
				const copiedParam = $.Drag.VisualEvent.deepCopyJSON(param);
				copiedParam.isList = false;
				copiedParam.value = value;
				delete copiedParam.default;
				
				if (copiedParam.type === "struct")
					copiedParam.value = sanitizeStructValue(copiedParam.value);
				
				const params = {};
				params[copiedParam.name] = copiedParam;
				const structValue = {};
				structValue[copiedParam.name] = copiedParam.value;
				
				const html = getParamContent(copiedParam.name, params, {}, structValue, depth);
				return `
					<div class="struct-list-item">
						${html}
						<div id="buttons-list">
							<button type="button" onclick="addListItem(event, this);">+</button>
							<button type="button" onclick="removeListItem(event, this);">−</button>
						</div>
					</div>
				`;
			};
			
			function getParamInputContent(param, value) {
				const input = $.Drag.VisualEvent.deepCopyJSON(param);
				input.value = value;
				input.isPluginParameter = true;
				input.pluginName = data.pluginName;
				input.data = input.data || "";
				input.data += ` data-inputName="${$.Drag.VisualEvent.escapeHTML(input.name)}" data-isList="${input.isList ? "true" : "false"}"`;
				input.isList = false;
				
				if (input.type === "boolean") {
					input.values = ["true", "false"];
					input.options = [input.on ? input.on : "On", input.off ? input.off : "Off"];
				}
				
				if (input.type === "location") {
					let loc = sanitizeStructValue(input.value);
				
					input.value = [
						parseInt(loc.mapId) || 0,
						parseInt(loc.x) || 0,
						parseInt(loc.y) || 0
					];
					
					input.data = input.data || "";
					input.data += ` data-allowSearch="true" data-allowMapChange="true"`;
				}
				
				return `
					<div>
						${$.Drag.VisualEvent.getInputField(input)}
					</div>
				`;
			};
			
			function getNestedStructContent(param, value, depth) {
				const structName = param.structName || param.struct || param.name;
				value = sanitizeStructValue(value);
				
				const pluginData = $.Drag.VisualEvent.getLocalizedPluginData(data.pluginName);
				const structData = pluginData && pluginData.structs ? pluginData.structs[structName] : null;
				
				if (!structData || !Array.isArray(structData.params))
					return `<span style="color: red;">Unknown structure: ${$.Drag.VisualEvent.escapeHTML(structName)}</span>`;
				
				const params = $.Drag.VisualEvent.deepCopyJSON(structData.params);
				const paramsByName = {};
				const paramsTree = {};
				const rootParams = [];
				
				for (const childParam of params) {
					if (!childParam || !childParam.name)
						continue;
					
					paramsByName[childParam.name] = childParam;
					
					if (childParam.parent && params.some(p => p && p.name === childParam.parent)) {
						paramsTree[childParam.parent] = paramsTree[childParam.parent] || [];
						paramsTree[childParam.parent].push(childParam.name);
					} else
						rootParams.push(childParam.name);
				}
				
				return rootParams.map(name => getParamContent(name, paramsByName, paramsTree, value, depth, structName)).join("");
			};
			
			function sanitizeStructValue(value) {
				if (!value)
					return {};
				
				if (typeof value === "object")
					return value;
				
				try {
					return JSON.parse(value);
				} catch (error) {
					try {
						return JSON.parse($.Drag.VisualEvent.unescapeQuotes(value, true));
					} catch (error2) {
						return {};
					}
				}
			};
			
			function toggleStructParamGroup(header) {
				const param = header.closest('.struct-param');
				if (!param)
					return;
				
				const children = param.nextElementSibling;
				if (!children || !children.classList.contains('struct-param-children'))
					return;
				
				const collapsed = param.getAttribute('data-collapsed') === "true";
				param.setAttribute('data-collapsed', !collapsed);
				children.classList.toggle('collapsed', !collapsed);
			};
			
			function addListItem(event, button) {
				event.stopPropagation();
				event.preventDefault();
				
				const list = button.closest('.struct-param-list');
				if (!list)
					return;
				
				const listName = list.getAttribute('data-list-name');
				const structName = list.getAttribute('data-source-struct') || "";
				const param = getStructParamByName(listName, structName);
				if (!param)
					return;

				const addButton = list.querySelector(':scope > #add-list');
				const depth = parseInt(list.getAttribute('data-depth')) || 0;
				const html = getParamListItem(param, "", depth);

				addButton.insertAdjacentHTML('beforebegin', html);
				$.Drag.VisualEvent.triggerAllOnReadyOnChange(document);
				refreshParametersTree();
			};
			
			function getStructParamByName(name, structName) {
				if (!name)
					return null;
				
				const pluginData = $.Drag.VisualEvent.getLocalizedPluginData(data.pluginName);
				if (!pluginData || !pluginData.structs)
					return null;
				
				if (structName && pluginData.structs[structName]) {
					const params = pluginData.structs[structName].params || [];
					const param = params.find(param => param && param.name === name);
					
					if (param)
						return $.Drag.VisualEvent.deepCopyJSON(param);
				}
				
				for (const struct in pluginData.structs) {
					const params = pluginData.structs[struct].params || [];
					const param = params.find(param => param && param.name === name);
					
					if (param)
						return $.Drag.VisualEvent.deepCopyJSON(param);
				}
				
				return null;
			};
			
			function removeListItem(event, button) {
				event.stopPropagation();
				event.preventDefault();
				
				const item = button.closest('.struct-list-item');
				if (item)
					item.remove();
				
				refreshParametersTree();
			};
			
			function restoreParamDefaultValue(event, button) {
				event.stopPropagation();
				event.preventDefault();
				
				const param = button.closest('.struct-param');
				if (!param)
					return;
				
				const inputs = Array.from(param.querySelectorAll('input, select, textarea')).filter(input => input.hasAttribute('data-defaultValue'));
				for (const input of inputs)
					restoreStructInputDefaultValue(input);
			};
			
			function restoreStructInputDefaultValue(input) {
				const defaultValue = input.getAttribute('data-defaultValue');
				
				if (input.type === "checkbox")
					input.checked = defaultValue === "true" || defaultValue === "on" || defaultValue === "1";
				else if (input.type === "radio")
					input.checked = input.value == defaultValue || input.getAttribute('data-value') == defaultValue;
				else if (input.type === "number")
					input.value = defaultValue || 0;
				else
					input.value = defaultValue || "";
				
				if (input.hasAttribute('data-value'))
					input.setAttribute('data-value', input.value);
				
				input.dispatchEvent(new Event('change', {bubbles: true}));
			};
			
			function addStructInputsFields(input) {
				const structContainer = input.parentElement.querySelector('#structContainer');
				const structContent = document.createElement('div');
				structContent.setAttribute('id', 'structContent');
				structContainer.appendChild(structContent);
				
				const structValue = JSON.parse(input.getAttribute('data-structValue'));
				const structName = input.getAttribute('data-structName');
				makeStructInputsFields(structValue, structName, structContent);
			};
			
			function refreshParametersTree() {
				const tree = document.querySelector('#parameters-tree');
				const container = document.querySelector('#inputs-container > div:first-child'); 
				
				if (!tree || !container)
					return;
				
				let html = "";
				for (const [i, param] of Array.from(container.querySelectorAll('.struct-param')).entries()) {
					const title = param.querySelector('#param-header > div:first-child b');
					if (!title)
						continue;
					
					const depth = Math.round((parseFloat(param.style.marginLeft) || 0) / 1.25);
					html += `
						<div class="parameters-tree-child" style="padding-left: ${depth * 1.1}em;" data-index=${i} onclick="scrollToParameter(this);">
							${$.Drag.VisualEvent.escapeHTML(title.textContent)}
						</div>
					`;
				}
				
				tree.innerHTML = html;
				updateHighlightedParameterTree();
			};
			
			function scrollToParameter(elem) {
				const container = document.querySelector('#inputs-container > div:first-child'); 
				const index = parseInt(elem.getAttribute('data-index'));
				const param = document.querySelectorAll('.struct-param')[index];
				if (!container || !param)
					return;
				
				const offsetTop = $.Drag.VisualEvent.getRelativeOffsetTop(param, container);
				container.scrollTop = offsetTop - container.offsetTop;
			};
			
			function updateHighlightedParameterTree() {
				const container = document.querySelector('#inputs-container > div:first-child'); 
				const tree = document.querySelector('#parameters-tree');
				if (!container || !tree)
					return;
				
				let index = -1;
				const params = Array.from(container.querySelectorAll('.struct-param'));
				for (const [i, param] of params.entries()) {
					const offsetTop = $.Drag.VisualEvent.getRelativeOffsetTop(param, container);
					if (offsetTop - container.scrollTop <= container.offsetTop + 40)
						index = i;
					else
						break;
				}
				
				if (index === -1)
					return;
				
				const treeChild = tree.querySelector(`*[data-index="${index}"]`);
				if (!treeChild)
					return;
				
				for (const selected of tree.querySelectorAll('.selected'))
					selected.classList.remove('selected');
				
				treeChild.classList.add('selected');
				scrollToTreeChild(tree, treeChild);
			};
			
			function scrollToTreeChild(tree, treeChild) {
				const top = treeChild.offsetTop - tree.offsetTop;
				const bottom = top + treeChild.offsetHeight;
				
				if (top < tree.scrollTop)
					tree.scrollTop = top - 8;
				else if (bottom > tree.scrollTop + tree.clientHeight)
					tree.scrollTop = bottom - tree.clientHeight + 8;
			};
			
			function gatherStructureValues() {
				const container = document.querySelector('#inputs-container > div');
				if (!container)
					return {};
				
				const values = {};
				for (const param of getParamChildrens(container))
					gatherStructParam(param, values);
				
				return values;
			};
			
			function getParamChildrens(container) {
				return Array.from(container.children).filter(child => child.classList && child.classList.contains('struct-param'));
			};
			
			function gatherStructParam(param, values) {
				if (!param)
					return;
				
				const name = param.getAttribute('data-input-name');
				if (!name)
					return;
				
				const isList = param.getAttribute('data-is-list') === "true";
				if (isList) {
					values[name] = JSON.stringify(gatherParamList(param));
					return;
				}
				
				const isStruct = isParamStruct(param);
				if (isStruct) {
					values[name] = JSON.stringify(gatherStruct(param));
					return;
				}
				
				const input = getParamInput(param);
				values[name] = input ? $.Drag.VisualEvent.getPluginCommandInputValue(input) : "";
				const children = getParamChildrenContainer(param);
				if (!children)
					return;
				
				for (const childParam of getParamChildrens(children))
					gatherStructParam(childParam, values);
			};
			
			function gatherStruct(param) {
				const children = getParamChildrenContainer(param);
				if (!children)
					return {};
				
				const values = {};
				for (const childParam of getParamChildrens(children))
					gatherStructParam(childParam, values);
				
				return values;
			};
			
			function gatherParamList(param) {
				const list = getParamChildrenContainer(param);
				if (!list || !list.classList.contains('struct-param-list'))
					return [];
				
				const values = [];
				for (const item of Array.from(list.children).filter(child => child.classList.contains('struct-list-item'))) {
					const childParam = item.querySelector(':scope > .struct-param');
					if (!childParam)
						continue;
					
					if (isParamStruct(childParam))
						values.push(JSON.stringify(gatherStruct(childParam)));
					else {
						const input = getParamInput(childParam);
						values.push(input ? $.Drag.VisualEvent.getPluginCommandInputValue(input) : "");
					}
				}
				
				return values;
			};
			
			function getParamChildrenContainer(param) {
				const sibling = param.nextElementSibling;
				if (sibling && sibling.classList.contains('struct-param-children'))
					return sibling;
				
				return null;
			};
			
			function getParamInput(param) {
				const inputContainer = param.querySelector(':scope > #input-param-container');
				if (!inputContainer)
					return null;
				
				let input = inputContainer.querySelector('input[data-iscommandparameter="true"], textarea[data-iscommandparameter="true"], select[data-iscommandparameter="true"]');
				if (input.type === "radio" && !input.checked) {
					input = inputContainer.querySelector(`#${input.id}[type="radio"][data-iscommandparameter="true"]:checked`);
					if (!input)
						input = inputContainer.querySelector('input[data-iscommandparameter="true"]');
				}
				
				return input;
			};
			
			function isParamStruct(param) {
				if (!param)
					return false;
				
				const type = param.getAttribute('data-input-type');
				return type && type === 'struct';
			};
			
			function apply() {
				ok(false);
			};
			
			function ok(shouldQuit = true) {
				try {
					const val = gatherStructureValues();
					data.input.setAttribute('data-structValue', JSON.stringify(val));
					data.input.dispatchEvent(new Event('change', {bubbles: true}));
				} catch (error) {
					const editor = $.Drag.VisualEvent.getEditor();
					if (editor)
						editor.console.error(`Couldn't parse struct ${data.pluginName}:${data.structName} :`, error);
					else
						console.error(`Couldn't parse struct ${data.pluginName}:${data.structName} :`, error);
				}
				
				if (shouldQuit)
					quit();
			};
			
			function quit() {
				window.close();
			};
			
			main();
		</script>
	</body>
</html>
