<!DOCTYPE html>
<html style="height: 100%">
    <head>
        <meta charset="UTF-8">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="viewport" content="user-scalable=no">
        <link rel="icon" href="../../icon/icon.png" type="image/png">
        <link rel="apple-touch-icon" href="../../icon/icon.png">
		<link href="../css/Drag_DevTools.css" rel="stylesheet">
		<style>
			html {
				overflow-y: auto;
			}

			#content {
				height: 100%;
				margin: 0;
			}
			
			#notes-container, #notetags-container {
				padding: 0.5em;
			}
			
			#notes-container > div, #notetags-container > div {
				padding: 0.5em;
				text-align: center;
			}
			
			#notetag-name-container, #notetag-value-container {
				display: flex;
				align-items: center;
				position: relative;
				margin-bottom: 0.5em;
			}
			
			#notetag-name-container::before, #notetag-name-container::after, #notetag-value-container::after {
				position: absolute;
				top: 50%;
				transform: translate(-50%, -50%);
				color: grey;
			}
			
			#notetag-name-container::before {
				content: "<";
				left: 0.625em;
			}
			
			#notetag-name-container::after {
				content: ":";
				right: 0.3125em;
			}
			
			#notetag-value-container::after {
				content: ">";
				right: 0.3125em;
			}
			
			#notetag-name-container > input {
				padding-left: 1em;
			}
			
			#bottom-container {
				position: fixed;
				bottom: 0;
				left: 0;
				right: 0;
				padding: 1em;
				padding-right: 4em;
				border-top: 0.125em solid rebeccapurple;
				background-color: var(--background-color);
				display: flex;
				justify-content: flex-end;
				z-index: 10;
			}
			
			#bottom-container > * {
				margin-right: 1.5em;
			}
			
			#bottom-container > *:last-child {
				margin-right: 0em;
			}

			#bottom-container > button {
				cursor: pointer;
				padding: 0.5em 2em;
			}
			
			input[type="checkbox"] + span {
				cursor: pointer;
			}
		</style>
    </head>
    <body style="height: 100%">
		<div id="content">
			<div id="notes-container">
				<span>Notes :</span>
				<input type="text" placeholder="Write notes" />
			</div>
			<div id="notetags-container"></div>
			<div id="bottom-container">
				<button onclick="ok()">OK</button>
				<button onclick="quit();">Cancel</button>
			</div>
		</div>
		<!--<div onclick="$.Drag.VisualEvent.toggleLightMode(document)" id="lightMode">
			<span>&#9790;</span>
			<span>&#9728;</span>-->
		</div>
		<script type="text/javascript">			
			// to do 
			// rememner notes and notetags position to replace them correctly in order on save 
			function main() {
				document.title = "Drag_DevTools_NotetagManager";
				loadDataMainWindow();
				$.Drag.VisualEvent.setLightMode(document);
				
				setup();
			};
			
			function loadDataMainWindow() {
				$ = window.opener;
			};
			
			function setup() {
				const reg = /<([^<>:]+)(:?)([^>]*)>/g;
				
				const notesInput = document.querySelector('#notes-container > input');
				// notesInput.value = data.eventData.note.replace(reg, "");
				notesInput.value = data.input.value.replace(reg, "");
				
				const notetagsContainer = document.querySelector('#notetags-container');
				let html = "";
				for (;;) {
					// const match = reg.exec(data.eventData.note);
					const match = reg.exec(data.input.value);
					if (match)
						html += getNotetagElem(match[1], match[3])
					else
						break;
				}
				
				notetagsContainer.innerHTML = `
					<span>Notetags :</span>
					<div>${getAddNotetagButton()}</div>
					${html}
				`;
			};
			
			function getNotetagElem(name = "", value = "") {
				return `
					<div id="notetag-container">
						<div id="notetag-name-container">
							<input placeholder="Name" type="text" value="${$.Drag.VisualEvent.escapeQuotes(name)}"/>
						</div>
						<div id="notetag-value-container">
							<input type="text" value="${$.Drag.VisualEvent.escapeQuotes(value)}" placeholder="Value" />
						</div>
						${getAddNotetagButton()}
						${getRemoveNotetagButton()}
					</div>
				`;
			};
			
			function getAddNotetagButton() {
				return `
					<span style="cursor: pointer; height: 1.5em;" onclick="addNotetag(this);">
						<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="currentColor" style="width: 1.5em; height: 1.5em;">
							<circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"></circle>
							<line x1="12" y1="7" x2="12" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"></line>
							<line x1="7" y1="12" x2="17" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"></line>
						</svg>
					</span>
				`;
			};
			
			function getRemoveNotetagButton() {
				return `
					<span style="cursor: pointer; height: 1.5em;" onclick="removeNotetag(this);">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" style="width: 1.5em; height: 1.5em;" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
							<circle cx="12" cy="12" r="10"></circle>
							<line x1="8" y1="12" x2="16" y2="12"></line>
						</svg>
					</span>
				`;
			};
			
			function removeNotetag(element) {
				element.parentNode.remove();
			};
			
			function addNotetag(element) {
				element.parentNode.insertAdjacentHTML("afterend", getNotetagElem())
			};
			
			function gatherNotetags() {
				const noteInput = document.querySelector('#notes-container > input');
				const note = $.Drag.VisualEvent.unescapeQuotes(noteInput.value);
				
				let notetags = "";
				for (const notetagContainer of document.querySelectorAll('#notetag-container')) {
					const notetagName = $.Drag.VisualEvent.unescapeQuotes(notetagContainer.querySelector('#notetag-name-container > input').value);
					const notetagValue = $.Drag.VisualEvent.unescapeQuotes(notetagContainer.querySelector('#notetag-value-container > input').value); //remove \n ?
					notetags += `<${notetagName}${notetagValue ? ':' : ''}${notetagValue}>`;
				};
				
				return `${note}${notetags}`;
			};

			function ok() {
				const val = gatherNotetags();
				// data.eventData.note = val;
				data.input.value = val;
				// data.input.setAttribute('value', val);
				// data.input.dispatchEvent(new Event('change', {bubbles: true}));
				$.Drag.VisualEvent.autoFitInput(data.input);
				$.Drag.VisualEvent.onInputChange(data.input);
				quit();
			};

			function quit() {
				window.close();
			};

			main();

		</script>
	</body>
</html>
